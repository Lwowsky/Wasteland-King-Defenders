<body class="notranslate">
  <div data-include="partials/header.html"></div>
  <main class="profile-page container">
    <section class="profile-card region-card action-log-page">
      <div class="profile-head">
        <div><h2 data-i18n="actionLog.title">Журнал дій</h2></div>
        <div class="region-head-actions"><span class="region-pill region-pill--region" id="actionLogRegionPill">R—</span></div>
      </div>
      <div class="auth-status" id="actionLogStatus" data-i18n="actionLog.loading">Завантажую журнал...</div>
      <div class="region-table-controls">
        <label class="region-control region-control--region"><span data-i18n="account.region">Регіон</span><input id="actionLogRegionInput" inputmode="numeric" placeholder="987" list="actionLogRegionList" /><datalist id="actionLogRegionList"></datalist></label>
        <button class="btn btn-primary region-open-btn" id="actionLogOpenBtn" type="button" data-i18n="region.openRegion">Відкрити</button>
      </div>
      <div class="action-log-cleanup" id="actionLogCleanupActions" hidden>
        <button class="btn btn-ghost" id="actionLogClearPageBtn" type="button" data-i18n="actionLog.clearPage">Очистити сторінку</button>
        <button class="btn btn-ghost" id="actionLogClearOldBtn" type="button" data-i18n="actionLog.clearOld">Очистити старіше 30 днів</button>
        <button class="btn btn-danger-soft" id="actionLogClearRegionBtn" type="button" data-i18n="actionLog.clearRegion">Очистити регіон</button>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table region-public-table">
          <thead><tr><th data-i18n="actionLog.time">Час</th><th data-i18n="actionLog.action">Дія</th><th data-i18n="actionLog.actor">Хто</th><th data-i18n="account.alliance">Альянс</th><th data-i18n="actionLog.details">Деталі</th><th data-i18n="actionLog.actions">Дії</th></tr></thead>
          <tbody id="actionLogBody"><tr><td colspan="6">...</td></tr></tbody>
        </table>
      </div>
      <div class="action-log-pager" aria-label="Пагінація журналу дій" data-i18n-aria-label="actionLog.paginationLabel">
        <button class="btn btn-ghost" id="actionLogPrevBtn" type="button" data-i18n="actionLog.prev">← Назад</button>
        <span id="actionLogPageText">Сторінка 1</span>
        <button class="btn btn-ghost" id="actionLogNextBtn" type="button" data-i18n="actionLog.next">Далі →</button>
      </div>
    </section>
