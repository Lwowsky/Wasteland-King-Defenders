<!DOCTYPE html><html lang="uk"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Таблиця регіону</title><script>(function(){function c(v){return String(v||'').trim().replace(/^#/,'').replace(/[^A-Za-z0-9_-]/g,'').slice(0,120)}function remember(type,code){if(!code)return;var item=JSON.stringify({app:'wkd',type:type,code:code,at:Date.now()});try{sessionStorage.setItem('wkd:share:regionTable',item);localStorage.setItem('wkd:share:regionTable:last',item);sessionStorage.setItem('wkd.lastRegionTableShareCode',item);window.name=item}catch(e){}}var q=new URLSearchParams(location.search);var code=c(q.get('s')||q.get('code')||q.get('link')||location.hash);var parts=String(location.pathname||'').split('/').filter(Boolean);var last=c(parts[parts.length-1]||'');if(!code&&last&&!/^(rt|rt\.html)$/i.test(last))code=last;remember('regionTable',code);var url=new URL('public-region-table.html',location.href);if(code){url.searchParams.set('s',code);url.hash=code}location.replace(url.toString());})();</script></head><body></body></html>
