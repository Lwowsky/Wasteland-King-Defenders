name: Update public stats cache

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate public stats cache
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          STATS_FULL_REBUILD_HOUR_UTC: '3'
          STATS_MAX_PENDING_CHANGES: '250'
        run: node scripts/update-public-stats-cache.mjs

      - name: Commit updated cache
        run: |
          if [[ -z "$(git status --porcelain public-cache/stats-summary.json)" ]]; then
            echo "Stats cache did not change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public-cache/stats-summary.json
          git commit -m "Update public stats cache"
          git push
