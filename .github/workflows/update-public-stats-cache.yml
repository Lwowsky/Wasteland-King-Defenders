name: Update public stats cache

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

permissions:
  contents: write

concurrency:
  group: update-public-stats-cache
  cancel-in-progress: false

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Generate public stats cache
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          STATS_FULL_REBUILD_HOUR_UTC: '3'
          STATS_MAX_PENDING_CHANGES: '250'
        run: node scripts/update-public-stats-cache.mjs

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public-cache/stats-summary.json

          if git diff --cached --quiet; then
            echo "Stats cache did not change."
            exit 0
          fi

          git commit -m "Update public stats cache"

          for i in 1 2 3; do
            echo "Push attempt $i..."

            if git push origin main; then
              echo "Stats cache pushed successfully."
              exit 0
            fi

            echo "Push failed. Pulling latest changes and retrying..."
            git pull --rebase origin main
          done

          echo "Failed to push stats cache after 3 attempts."
          exit 1