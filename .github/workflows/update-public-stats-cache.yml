name: Update public stats cache

on:
  workflow_dispatch: {}
  schedule:
    # 2 рази на день: 03:00 і 15:00 UTC
    - cron: '0 3,15 * * *'

permissions:
  contents: write

concurrency:
  group: update-public-stats-cache
  cancel-in-progress: false

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Generate public stats cache from Cloudflare D1
        env:
          PUBLIC_STATS_EXPORT_URL: ${{ vars.PUBLIC_STATS_EXPORT_URL }}
          PUBLIC_STATS_EXPORT_SECRET: ${{ secrets.PUBLIC_STATS_EXPORT_SECRET }}
        run: node scripts/update-public-stats-cache.mjs

      - name: Generate public share snapshots from Cloudflare D1
        env:
          PUBLIC_SHARE_EXPORT_URL: ${{ vars.PUBLIC_SHARE_EXPORT_URL }}
          PUBLIC_SHARE_EXPORT_SECRET: ${{ secrets.PUBLIC_STATS_EXPORT_SECRET }}
        run: node scripts/update-public-share-snapshots.mjs

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A public-cache

          echo "Generated public-cache files:"
          ls -la public-cache || true
          git status --short public-cache || true

          if git diff --cached --quiet; then
            echo "Stats cache did not change."
            exit 0
          fi

          git commit -m "Update public stats cache"

          for i in 1 2 3; do
            echo "Push attempt $i..."

            if git push origin main; then
              echo "Stats cache pushed successfully."
              exit 0
            fi

            echo "Push failed. Pulling latest changes and retrying..."
            git pull --rebase origin main
          done

          echo "Failed to push stats cache after 3 attempts."
          exit 1
