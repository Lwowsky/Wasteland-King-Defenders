<!DOCTYPE html>
<html lang="uk" translate="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wasteland King Defenders</title>
  <script>
    (function () {
      var path = window.location.pathname || '';

      var formShort = path.match(/^\/f\/([A-Za-z0-9_-]{6,160})\/?$/);
      if (formShort) {
        window.location.replace('/region-form.html?s=' + encodeURIComponent(formShort[1]));
        return;
      }

      var formWithRegion = path.match(/^\/f\/(\d{1,8})\/([A-Za-z0-9_-]{6,160})\/?$/);
      if (formWithRegion) {
        window.location.replace('/region-form.html?r=' + encodeURIComponent(formWithRegion[1]) + '&s=' + encodeURIComponent(formWithRegion[2]));
        return;
      }

      var plan = path.match(/^\/(?:p|plan)\/([A-Za-z0-9_-]{6,160})\/?$/);
      if (plan) {
        window.location.replace('/public-plan.html?s=' + encodeURIComponent(plan[1]));
        return;
      }

      var table = path.match(/^\/rt\/([A-Za-z0-9_-]{6,160})\/?$/);
      if (table) {
        window.location.replace('/public-region-table.html?s=' + encodeURIComponent(table[1]));
        return;
      }

      window.location.replace('/index.html');
    })();
  </script>
</head>
<body></body>
</html>
