<section aria-label="Дублікати ніків" class="modal duplicate-nick-modal" data-i18n-aria-label="duplicate_modal_title" id="duplicateNickModal" aria-hidden="true">
  <button aria-label="Закрити" class="modal-backdrop" data-duplicate-modal-close data-i18n-aria-label="close_menu" type="button"></button>
  <div aria-modal="true" class="modal-card duplicate-nick-modal-card" role="dialog" aria-labelledby="duplicateNickModalTitle">
    <div class="modal-head">
      <div>
        <h2 id="duplicateNickModalTitle" data-i18n="duplicate_modal_title">Дублікати ніків</h2>
        <p class="muted" id="duplicateNickModalSubtitle" data-i18n="duplicate_modal_subtitle">Подивись усі однакові реєстрації, залиш одного гравця й прибери зайві дублікати.</p>
      </div>
      <button aria-label="Закрити" class="btn btn-icon" data-duplicate-modal-close data-i18n-aria-label="close_menu" type="button">✕</button>
    </div>
    <div class="modal-grid duplicate-nick-modal-grid">
      <section class="panel subpanel duplicate-nick-modal-main">
        <div class="duplicate-nick-modal-summary">
          <div class="duplicate-nick-modal-kicker" data-i18n="shift" id="duplicateNickModalShift">Зміна</div>
          <div class="duplicate-nick-modal-meta" id="duplicateNickModalMeta">—</div>
          <div class="duplicate-nick-modal-hint" data-i18n="duplicate_modal_hint" id="duplicateNickModalHint">Натисни на запис, який треба залишити, а потім прибери зайві дублікати.</div>
        </div>
        <div class="duplicate-nick-modal-list" id="duplicateNickModalList"></div>
      </section>
      <aside class="panel subpanel duplicate-nick-modal-side">
        <div class="duplicate-nick-actions-title" data-i18n="duplicate_actions_title">Що зробити</div>
        <div class="muted small duplicate-nick-actions-text" data-i18n="duplicate_modal_selection_hint" id="duplicateNickModalSelectionHint">Вибери один запис, який потрібно залишити активним.</div>
        <div class="duplicate-nick-modal-actions">
          <button class="btn btn-primary" data-i18n="duplicate_keep_only" id="duplicateNickKeepOnlyBtn" type="button">Залишити тільки вибраний</button>
          <button class="btn btn-sm btn-danger-soft" data-i18n="duplicate_delete_selected_record" id="duplicateNickDeleteCurrentBtn" type="button">Видалити вибраний запис</button>
          <button class="btn btn-sm" data-duplicate-modal-close data-i18n="close" type="button">Закрити</button>
        </div>
        <div class="duplicate-nick-modal-status" id="duplicateNickModalStatus" hidden></div>
      </aside>
    </div>
  </div>
</section>
