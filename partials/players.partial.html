<section class="panel players-panel">
  <div class="panel-head">
    <div>
      <h2>Гравці</h2>
      <p class="muted">
        Імпорт CSV / Excel / Google Sheets link + розподіл по 5 базах
      </p>
    </div>
    <div class="panel-actions">
      <button
        aria-pressed="false"
        class="btn btn-sm"
        id="showAllDataBtn"
        type="button"
      >
        Показати всі дані
      </button>
      <button class="btn btn-sm" id="openImportQuickBtn" type="button">
        Імпорт CSV/XLSX/URL
      </button>
    </div>
  </div>

  <div class="stats-grid stats-grid--players">
  <article class="stat-card stat-card--duo" data-stat-card="summary">
    <div class="stat-duo-item" data-stat-card="total">
      <span>Всього гравців</span>
      <strong>0</strong>
    </div>
    <div class="stat-duo-divider" aria-hidden="true"></div>
    <div class="stat-duo-item" data-stat-card="captains">
      <span>Капітанів готові</span>
      <strong>0</strong>
    </div>
  </article>

  <article class="stat-card stat-card--rich stat-card--plain" data-stat-card="roles">
    <div class="stat-split stat-split--roles" id="roleCountsDisplay" aria-label="Розподіл ролей">
      <span class="stat-chip stat-chip--role is-fighter"><b>0</b><small>Fighter</small></span>
      <span class="stat-chip stat-chip--role is-rider"><b>0</b><small>Rider</small></span>
      <span class="stat-chip stat-chip--role is-shooter"><b>0</b><small>Shooter</small></span>
    </div>
  </article>

  <article class="stat-card stat-card--rich stat-card--plain" data-stat-card="shifts">
    <div class="stat-split stat-split--shifts" id="shiftCountsDisplay" aria-label="Розподіл по змінах">
      <span class="stat-chip stat-chip--shift is-shift1"><b>0</b><small>Shift 1</small></span>
      <span class="stat-chip stat-chip--shift is-shift2"><b>0</b><small>Shift 2</small></span>
      <span class="stat-chip stat-chip--shift is-both"><b>0</b><small>Both</small></span>
    </div>
  </article>
</div>

  <div class="filters-row">
    <label>
      <span>Пошук</span>
      <input
        id="topSearchFilter"
        placeholder="Пошук по ніку / альянсу"
        type="text"
      />
    </label>

    <label>
      <span>Роль</span>
      <select id="topRoleFilter">
        <option>Усі</option>
        <option>Shooter</option>
        <option>Fighter</option>
        <option>Rider</option>
      </select>
    </label>

    <label>
      <span>Shift</span>
      <select id="topShiftFilter">
        <option value="all">Усі</option>
        <option value="shift1">Shift 1</option>
        <option value="shift2">Shift 2</option>
        <option value="both">Both</option>
      </select>
    </label>

    <label>
      <span>Статус</span>
      <select id="topStatusFilter">
        <option>Усі</option>
        <option>Вільні</option>
        <option>У базі</option>
        <option>Капітани</option>
      </select>
    </label>

    <label>
      <span>Tier</span>
      <select id="topTierFilter">
        <option value="all">Усі</option>
        <option>T14</option>
        <option>T13</option>
        <option>T12</option>
        <option>T11</option>
        <option>T10</option>
        <option>T9</option>
      </select>
    </label>

    <label>
      <span>Rows</span>
      <select id="pageSizeSelect">
        <option selected>10</option>
        <option>20</option>
        <option>50</option>
        <option value="all">Усі</option>
      </select>
    </label>

    <button
      class="btn btn-sm reset-filters-btn"
      id="resetFiltersBtn"
      type="button"
    >
      Скинути фільтри
    </button>
  </div>

  <div class="table-wrap">
    <table class="data-table" id="playersDataTable">
      <thead>
        <tr>
          <th data-field="name">Player name</th>
          <th data-field="alliance">Alliance</th>
          <th data-field="role">Focus troop</th>
          <th data-field="tier">
            Tier
            <button
              class="sort-btn"
              data-sort="tier"
              type="button"
              title="Sort by Tier"
              aria-label="Sort by Tier"
            >
              ↓
            </button>
          </th>
          <th data-field="march">March size</th>
          <th data-field="rally">
            Rally size
            <button
              class="sort-btn"
              data-sort="rally"
              type="button"
              title="Sort by Rally size"
              aria-label="Sort by Rally size"
            >
              ↓
            </button>
          </th>
          <th data-field="captainReady">Captain</th>
          <th data-field="shiftLabel">Shift</th>
          <th class="optional-col is-hidden-col" data-col-key="lair_level" data-field="lair">
            Lair level
          </th>
          <th data-col-key="actions" data-field="actions">Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="table-pagination">
    <button class="btn btn-sm" id="pagePrevBtn" type="button">◀</button>
    <span id="pageInfoText">Page 1 / 1</span>
    <button class="btn btn-sm" id="pageNextBtn" type="button">▶</button>
  </div>
</section>
