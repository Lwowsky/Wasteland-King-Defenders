<div class="region-form-shell">
  <div class="profile-head region-form-head">
    <div>
      <h2 data-i18n="region.formTitle">Реєстрація на пустош</h2>
    </div>
    <div class="region-head-actions">
      <span class="region-pill region-pill--region" id="regionNumberPill">R—</span>
      <span class="region-pill" id="regionFormState">...</span>
    </div>
  </div>

  <div class="auth-status" id="regionStatus">...</div>

  <div class="region-timer-card region-timer-card--public" id="regionCountdownBox" hidden>
    <b id="regionCloseText" data-i18n="region.closeAt">Закриття реєстрації: —</b>
    <span id="regionCountdownText" data-i18n="region.timer">Таймер: —</span>
    <small id="regionEventText" data-i18n="region.wastelandStart">Пустош: —</small>
    <small id="regionOpenedText" data-i18n="regionSettings.openedAtPlaceholder">Запущено: —</small>
    <small id="regionOpenedByText" data-i18n="regionSettings.openedByPlaceholder">Запустив: —</small>
  </div>

  <div class="region-event-info" id="regionEventInfo" hidden>
    <span id="regionHostAllianceText" data-i18n="region.hostAlliance">Альянс проводить: —</span>
    <span id="regionGovernorText" data-i18n="region.governor">Губернатор: —</span>
  </div>

  <form class="region-form-block" id="wastelandForm" hidden>
    <div class="region-profile-tools" id="regionProfileTools" hidden>
      <div class="region-profile-tools-title">
        <b data-i18n="region.useSavedPlayerTitle">Дані з профілю</b>
      </div>
      <select id="wrSavedFarmSelect" aria-label="Збережені гравці"></select>
      <label class="region-check region-check--inline"><input id="wrAutoFillProfile" type="checkbox" /> <span data-i18n="region.autoFillFromProfile">Автоматично заповнювати з профілю</span></label>
      <label class="region-check region-check--inline"><input id="wrShowUtcAndLocal" type="checkbox" /> <span data-i18n="region.showUtcAndLocal">Показувати UTC і свій час</span></label>
      <button class="btn btn-primary" id="wrFillFromProfileBtn" type="button" data-i18n="region.fillFromProfile">Заповнити з профілю</button>
    </div>

    <div class="region-form-title">
      <div>
        <h3 id="regionFormTitleText" data-i18n="region.formTitle">Реєстрація на пустош</h3>
        <p id="regionFormDescText" data-i18n="region.fillRequest">Заповни заявку для свого регіону.</p>
      </div>
      <button class="btn" id="openRegionTableBtn" type="button" data-i18n="region.table">Таблиця регіону</button>
    </div>

    <div class="region-grid">
      <label class="region-field"><span data-i18n="account.nickname">Нік у грі <b>*</b></span><input id="wrNickname" required autocomplete="off" /></label>
      <label class="region-field"><span data-i18n="account.alliance">Альянс <b>*</b></span><input id="wrAlliance" required maxlength="3" autocomplete="off" list="wrAllianceList" /><datalist id="wrAllianceList"></datalist></label>
      <label class="region-field"><span data-i18n="regionForm.mainTroopType">Основний тип військ <b>*</b></span><select id="wrTroopType" required><option value="" data-i18n="common.selectType">Вибери тип</option><option value="fighter" data-i18n="troop.fighter">Бійці</option><option value="rider" data-i18n="troop.rider">Наїзники</option><option value="shooter" data-i18n="troop.shooter">Стрільці</option></select></label>
      <label class="region-field"><span data-i18n="playerEdit.tier">Тір <b>*</b></span><select id="wrTier" required></select></label>
      <label class="region-field"><span data-i18n="regionForm.lairLevel">Рівень лігва</span><input id="wrLairLevel" inputmode="numeric" placeholder="Наприклад: 45" data-i18n-placeholder="regionForm.example45" /></label>
      <label class="region-field"><span data-i18n="regionForm.marchSize">Розмір маршу</span><input id="wrMarch" inputmode="numeric" placeholder="Наприклад: 301000" data-i18n-placeholder="regionForm.example301000" /></label>
      <label class="region-field"><span data-i18n="regionForm.rallySize">Розмір ралі</span><input id="wrRally" inputmode="numeric" placeholder="Наприклад: 1350000" data-i18n-placeholder="regionForm.example1350000" /></label>
      <div class="region-field region-field--full">
        <span data-i18n="regionForm.readiness">Готовність</span>
        <div class="region-check-grid">
          <label class="region-check"><input id="wrReadyAttack" type="checkbox" /> <span data-i18n="regionForm.readyAttack">Готовий атакувати</span></label>
          <label class="region-check"><input id="wrCaptain" type="checkbox" /> <span data-i18n="regionForm.captainReady">Готовий бути капітаном</span></label>
        </div>
      </div>
      <div class="region-field region-field--full">
        <span data-i18n="regionForm.shiftAvailability">Доступність по змінах <b>*</b></span>
        <div class="region-check-grid" id="wrShiftOptions"></div>
      </div>
      <div class="region-field region-field--full" id="extraTroopPanel">
        <label class="region-check"><input id="wrExtraEnabled" type="checkbox" /> <span data-i18n="region.form.extraSquadToggle">Є додаткові повні загони інших типів</span></label>
        <div class="region-extra-types-grid is-disabled" id="extraTroopFields">
          <article class="region-extra-card" data-extra-card="fighter">
            <h4 data-i18n="troop.fighter">Бійці</h4>
            <label class="region-check region-extra-enable"><input type="checkbox" data-extra-troop="fighter" /> <span data-i18n="common.enable">Включити</span></label>
            <label class="region-field region-extra-tier"><span data-i18n="region.form.extraTier">Додатковий тір</span><select data-extra-tier="fighter"></select></label>
          </article>
          <article class="region-extra-card" data-extra-card="rider">
            <h4 data-i18n="troop.rider">Наїзники</h4>
            <label class="region-check region-extra-enable"><input type="checkbox" data-extra-troop="rider" /> <span data-i18n="common.enable">Включити</span></label>
            <label class="region-field region-extra-tier"><span data-i18n="region.form.extraTier">Додатковий тір</span><select data-extra-tier="rider"></select></label>
          </article>
          <article class="region-extra-card" data-extra-card="shooter">
            <h4 data-i18n="troop.shooter">Стрільці</h4>
            <label class="region-check region-extra-enable"><input type="checkbox" data-extra-troop="shooter" /> <span data-i18n="common.enable">Включити</span></label>
            <label class="region-field region-extra-tier"><span data-i18n="region.form.extraTier">Додатковий тір</span><select data-extra-tier="shooter"></select></label>
          </article>
        </div>
      </div>
      <label class="region-field region-field--full"><span data-i18n="region.comment">Коментар</span><textarea id="wrComment" placeholder="Можеш написати час, обмеження або примітку"></textarea></label>
      <div class="region-field region-field--full" id="regionCustomFieldsWrap" hidden>
        <span data-i18n="regionForm.extraFields">Додаткові поля регіону</span>
        <div class="region-custom-fields" id="regionCustomFields"></div>
      </div>
    </div>

    <div class="region-actions">
      <button class="btn" id="saveWastelandDraftBtn" type="button" data-i18n="regionForm.saveDraft">Зберегти заявку</button>
      <button class="btn region-save" type="submit" data-i18n="regionForm.submit">Відправити заявку</button>
      <button class="btn" id="resetWastelandFormBtn" type="button" data-i18n="common.clear">Очистити</button>
    </div>
  </form>
</div>
