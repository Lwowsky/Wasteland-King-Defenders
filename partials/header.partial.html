<header class="app-header">
  <div class="container header-inner">
    <div class="brand">
      <img
        src="img/logo.webp"
        alt="Wasteland King Defenders"
        class="brand-badge brand-logo" width="160" height="135" decoding="async" fetchpriority="high"
      />
      <div class="brand-text">
        <h1>Wasteland <span>King</span> Defenders</h1>
        <p class="muted">Puzzle &amp; Survival — Tower Planner</p>
      </div>
    </div>

    <div class="lang">
      <button
        class="lang-btn"
        type="button"
        id="langBtn"
        aria-haspopup="listbox"
        aria-expanded="false"
      >
        <span class="lang-ico" aria-hidden="true">🌐</span>
        <span class="lang-label" id="langLabel">Українська</span>
        <span class="lang-caret" aria-hidden="true">▾</span>
      </button>

      <div class="lang-menu" id="langMenu" role="listbox" aria-label="Language">
        <button
          class="lang-item"
          type="button"
          data-lang="uk"
          role="option"
          aria-selected="false"
        >
          <span class="lang-flag">🇺🇦</span
          ><span class="lang-name">Українська</span
          ><span class="lang-code">UK</span>
        </button>
        <button
          class="lang-item"
          type="button"
          data-lang="en"
          role="option"
          aria-selected="true"
        >
          <span class="lang-flag">🇬🇧</span><span class="lang-name">English</span
          ><span class="lang-code">EN</span>
        </button>
        <button
          class="lang-item"
          type="button"
          data-lang="ru"
          role="option"
          aria-selected="false"
        >
          <span class="lang-flag">ru</span><span class="lang-name">Русский</span
          ><span class="lang-code">RU</span>
        </button>
      </div>
    </div>
    <button
      class="burger-btn"
      id="burgerBtn"
      aria-label="Open menu"
      aria-expanded="false"
      type="button"
    >
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- Drawer menu -->
<div class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer-backdrop" id="drawerBackdrop"></div>

  <aside class="drawer-panel" role="dialog" aria-modal="true" aria-label="Menu">
    <div class="drawer-top">
      <div class="drawer-title">Menu</div>
      <button
        class="drawer-close"
        id="drawerClose"
        aria-label="Close menu"
        type="button"
      >
        ✕
      </button>
    </div>

    <div class="drawer-body">
      <button class="btn btn-primary" id="openSettingsBtnMobile" type="button">
        Налаштування / Імпорт
      </button>
      <button class="btn" id="openBoardBtnMobile" type="button">
        Final Board View
      </button>
      <button class="btn" id="openTowerCalcBtnMobile" type="button">
        Tower Calculator
      </button>
    </div>
  </aside>
</div>
