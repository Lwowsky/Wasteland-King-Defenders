<!DOCTYPE html><html lang="uk"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wasteland form</title><script>(function(){function r(v){return String(v||'').replace(/[^0-9]/g,'').slice(0,8)}function c(v){return String(v||'').trim().replace(/^#/,'').replace(/[^A-Za-z0-9_-]/g,'').slice(0,120)}function remember(region,code){if(!code)return;var item=JSON.stringify({app:'wkd',type:'regionForm',region:region||'',code:code,at:Date.now()});try{sessionStorage.setItem('wkd:share:regionForm',item);localStorage.setItem('wkd:share:regionForm:last',item);sessionStorage.setItem('wkd.regionForm.shortCode',item);window.name=item}catch(e){}}var q=new URLSearchParams(location.search);var region=r(q.get('r')||q.get('region')||'');var code=c(q.get('s')||q.get('code')||q.get('link')||'');var h=String(location.hash||'').replace(/^#/,'').trim();var m=h.match(/^(\d{1,8})\/([A-Za-z0-9_-]{6,160})$/);if(m){region=region||r(m[1]);code=code||c(m[2])}else if(h){code=code||c(h)}remember(region,code);var url=new URL('region-form.html',location.href);if(region)url.searchParams.set('r',region);if(code){url.searchParams.set('s',code);url.hash=(region?region+'/':'')+code}location.replace(url.toString());})();</script></head><body></body></html>
