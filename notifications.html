<!DOCTYPE html>
<html lang="uk" translate="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="google" content="notranslate" />
  <title data-i18n="notifications.title">Сповіщення — Wasteland King Defenders</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/auth-page.css" />
  <link rel="stylesheet" href="css/profile-page.css" />
  <link rel="stylesheet" href="css/notifications-page.css" />
  <link rel="stylesheet" href="css/players.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <script defer src="js/i18n.js?v=154"></script>
  <script defer src="js/i18n-uk.js"></script>
  <script defer src="js/i18n-en.js"></script>
  <script defer src="js/i18n-ru.js"></script>
  <script defer src="js/i18n-pl.js"></script>
  <script defer src="js/i18n-de.js"></script>
  <script defer src="js/i18n-ja.js"></script>
  <script defer src="js/i18n-zh.js"></script>
  <script defer src="js/i18n-ko.js"></script>
  <script defer src="js/i18n-vi.js"></script>
  <script defer src="js/i18n-ar.js"></script>
  <script defer src="js/i18n-autokeys.js"></script>
  <script defer src="js/core/dom.js"></script>
  <script defer src="js/badges.js?v=154"></script>
  <script defer src="js/core/partials.js"></script>
  <script defer src="js/header.js"></script>
  <script defer src="js/core/state.js"></script>
  <script defer src="js/core/app-boot.js"></script>
  <script defer src="js/app-login-shell.js"></script>
  <script type="module" src="js/auth-google.js?v=154"></script>
  <script type="module" src="js/notifications.js?v=154"></script>
  <script type="module" src="js/pages/notifications-page.js?v=154"></script>
</head>
<body class="notranslate">
  <div data-include="partials/header.html"></div>
  <main class="profile-page container">
    <section class="profile-card region-card notifications-page">
      <div class="profile-head"><div><h2 data-i18n="notifications.title">Сповіщення</h2></div></div>
      <div class="auth-status" id="notificationsStatus" data-i18n="notifications.loading">Завантажую сповіщення...</div>
      <div class="profile-tabs notifications-tabs" role="tablist" aria-label="Сповіщення">
        <button class="profile-tab is-active" id="notificationsNoticeTab" type="button" data-notifications-tab="notifications" data-i18n="notifications.noticeTab">Сповіщення</button>
        <button class="profile-tab" id="notificationsInboxTab" type="button" data-notifications-tab="inbox" data-i18n="notifications.inboxTab">Отримані повідомлення</button>
        <button class="profile-tab" id="notificationsSentTab" type="button" data-notifications-tab="sent" data-i18n="notifications.sentTab">Надіслані повідомлення</button>
        <button class="profile-tab" id="notificationsComposeTab" type="button" data-notifications-tab="compose" data-i18n="notifications.composeTab">Написати повідомлення</button>
      </div>
      <div class="notifications-filterbar" aria-label="Фільтр повідомлень">
        <button class="notifications-filter is-active" type="button" data-notifications-filter="active" data-i18n="notifications.filterActive">Активні</button>
        <button class="notifications-filter" type="button" data-notifications-filter="unread" data-i18n="notifications.filterUnread">Непрочитані</button>
        <button class="notifications-filter" type="button" data-notifications-filter="archived" data-i18n="notifications.filterArchived">Архів</button>
      </div>
      <section class="notifications-panel notifications-notices" id="notificationsNotices">
        <p class="notifications-readonly" data-i18n="notifications.readOnlyHint">Сповіщення тільки для перегляду. Написати повідомлення можна в окремій вкладці.</p>
        <div class="notifications-page-list" id="notificationsNoticeList"></div>
      </section>
      <section class="notifications-panel notifications-inbox" id="notificationsInbox" hidden>
        <div class="notifications-page-list notifications-message-list" id="notificationsInboxList"></div>
      </section>
      <section class="notifications-panel notifications-sent" id="notificationsSent" hidden>
        <div class="notifications-page-list notifications-sent-list" id="notificationsSentList"></div>
      </section>
      <section class="notifications-compose" id="notificationsCompose" hidden>
        <h3 data-i18n="messages.title">Повідомлення на сайті</h3>
        <div class="message-grid">
          <label><span data-i18n="messages.target">Кому</span><select id="messageTargetType"></select></label>
          <label class="message-target-extra" id="messageRegionWrap"><span data-i18n="account.region">Регіон</span><select id="messageRegionSelect"></select></label>
          <label class="message-target-extra" id="messageAllianceWrap"><span data-i18n="account.alliance">Альянс</span><input id="messageAllianceInput" maxlength="3" placeholder="YYY" /></label>
          <label class="message-target-extra" id="messagePlayerWrap"><span data-i18n="messages.player">Гравець</span><input id="messagePlayerInput" list="messagePlayerList" placeholder="Lwowsky" autocomplete="off" /><datalist id="messagePlayerList"></datalist><small class="message-player-meta" id="messagePlayerMeta"></small></label>
          <label class="message-full"><span data-i18n="messages.subject">Тема</span><input id="messageSubjectInput" maxlength="80" placeholder="Повідомлення" /></label>
          <label class="message-full"><span data-i18n="messages.body">Текст повідомлення</span><textarea id="messageBodyInput" maxlength="600"></textarea></label>
        </div>
        <div class="message-actions">
          <button class="btn btn-primary" id="sendSiteMessageBtn" type="button" data-i18n="messages.send">Відправити</button>
          <span class="message-hint" id="messageSendHint"></span>
        </div>
      </section>
      <div class="region-actions"><button class="btn region-save" id="notificationsMarkAllBtn" type="button" data-i18n="notifications.markRead">Позначити прочитаними</button><button class="btn btn-message-soft" id="notificationsClearArchiveBtn" type="button" data-i18n="notifications.clearArchive">Очистити архів</button></div>
    </section>
  </main>
  <div class="container"><div data-include="partials/footer.html"></div></div>
</body>
</html>
